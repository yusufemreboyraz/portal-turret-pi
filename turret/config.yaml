# Portal Turret yapılandırması — tüm ayarlar tek yerde.
# Açılar derece (0-180). Kalibrasyon değerleri calibrate.py tarafından doldurulur.

serial:
  port: /dev/ttyACM0   # Pi/Linux. (Mac: /dev/cu.usbmodemXXXX)
  baud: 115200
  command_hz: 30          # saniyede gönderilen komut sayısı
  reconnect_delay_s: 2.0

camera:
  width: 640
  height: 480
  fps: 30
  hflip: true             # ayna düzeltmesi: sen sağa gidince göz de sağa baksın
  vflip: false

detection:
  # Mac geliştirme: backend=yolo (ultralytics + .pt) hızlı kurulum.
  # Pi 5 üretim: backend=onnx + yolo11n.onnx ÖNERİLİR
  #   -> ultralytics/torch GEREKMEZ; sadece onnxruntime+numpy+cv2.
  backend: onnx           # yolo | onnx | mediapipe  (Pi'de onnx)
  model: yolo11n.onnx     # yolo: .pt | onnx: .onnx (turret/ klasöründen veya tam yol)
  use_ncnn: true          # sadece backend=yolo iken etkili (NCNN export)
  conf: 0.45              # minimum güven
  person_class_id: 0      # COCO 'person'
  aim_y_offset_ratio: -0.20 # nişan noktası: 0=tam merkez, -0.20=göğüs (görselleştirme için)
                            # -0.35 ≈ baş/omuz, 0 = göbek/merkez. Pozitif değer aşağı.
  # Lazer ↔ kamera paralaks düzeltmesi (calibrate_aim.py yazar).
  # Birim: piksel. +x sağa, +y aşağı. Lazer fiziksel olarak nereye düşüyorsa
  # ona göre tunable — sarı artıyı değil, kırmızı lazer noktasını izle.
  aim_pixel_offset_x: 0
  aim_pixel_offset_y: -100
  # En büyük (en yakın) insan hedef seçilir.

servos:
  # Mekanik limitler — montajda kendi turretine göre daralt.
  pan:  { min: 55, max: 125, center: 90, invert: false }   # genişlik 70, merkez 90
  tilt: { min: 35, max: 145, center: 90, invert: false }   # genişlik 110, merkez 90
  eye_x: { min: 55, max: 135, center: 95, invert: false }   # sol 55 - sağ 135
  eye_y: { min: 0, max: 70, center: 35, invert: false }     # yukarı 0 - aşağı 70
  eye_follow_gain: 0.35   # (sadece eye_direct:false iken) göz pan/tilt'i taklit oranı
  eye_direct: true        # true: göz DOĞRUDAN hedef pikseline bakar (eye-only demo)
  laser_always_on: true

smoothing:
  max_step_deg: 12.0      # kare başına max açı değişimi (büyük = daha hızlı/snappy)
  lowpass_alpha: 0.55     # 0..1, büyük = daha hızlı tepki (küçük = yumuşak/yavaş)
  deadzone_px: 25         # hedef kare merkezine bu kadar yakınsa kıpırdama (titreme önler)

# Kamera pikselinden servo açısına doğrusal eşleme.
# calibrate.py bunu yazar. Varsayılan: kabaca lineer, FOV ~ tüm aralık.
calibration:
  pan:  { px_min: 0,   px_max: 640, deg_at_px_min: 125, deg_at_px_max: 55 }
  tilt: { px_min: 0,   px_max: 480, deg_at_px_min: 145, deg_at_px_max: 35 }

# Eski Turret.ini zamanlayıcı mantığı (ms).
timers:
  found_ms: 1000          # hedef onayı (TARGET_ACQUIRED -> TRACKING)
  lost_ms: 1000           # hedef kaybı onayı
  reacquire_ms: 500       # kayıptan sonra yeniden kilit penceresi
  fire_cooldown_ms: 4000  # "Fire/Gotcha" sesi + LED + geri tepme tekrar aralığı
  fire_duration_ms: 600   # ateş efekti süresi (firmware FIRE_MS ile uyumlu)
  fire_bbox_ratio: 0.40   # bbox bu oranda kareyi kaplarsa ATEŞ (yakınlık eşiği)
  lock_tolerance_px: 40   # (eski; artık kullanılmıyor — fire_bbox_ratio devraldı)

# Geri tepme efekti: ateş penceresi boyunca pan/tilt'e ofset.
# Kapalı = temiz hareket. true yaparsan ateş anında sarsıntı eklenir.
recoil:
  enabled: false
  tilt_kick_deg: 10       # kol yukarı tepme miktarı (yön mekanik kuruluma göre)
  pan_jitter_deg: 3       # sağa-sola hafif titreme
  freq_hz: 7.0            # tepme salınım frekansı

# Boştayken doğal "etrafa bakınma".
# Kapalı = boştayken merkezde sabit durur. true = rastgele tarama (kesik kesik his).
idle_scan:
  enabled: false
  min_change_s: 1.5       # yeni rastgele hedef seçme aralığı (alt)
  max_change_s: 4.0       # (üst) — arada bekler, doğal his
  pan_margin_deg: 5       # uç sınırlardan uzak dur
  tilt_jitter_deg: 8      # küçük dikey rastgele kıpırtı

sounds:
  enabled: true
  # Çalma modu:
  #   network -> Pi HTTP sunucusu açar, telefon tarayıcısı hoparlör olur
  #              (Pi 5'te ses kartı yoksa ÖNERİLEN)
  #   pygame  -> yerel pygame.mixer (Mac/ses kartı olan Linux)
  #   aplay   -> ALSA aplay subprocess
  mode: pygame
  network:
    host: 0.0.0.0
    port: 8765
  base_dir: sounds
  found:  [TargetFound/ISeeYou.wav, TargetFound/ThereYouAre.wav, TargetFound/Acquired.wav]
  lock:   [TargetFound/Gotcha.wav, Fire.wav, Fire/FireShort.wav]
  lost:   [TargetLost/AreYouStillThere.wav, TargetLost/TargetLost.wav]

debug:
  show_window: true        # Mac demosunda tespit penceresini gör (Pi headless'te false yap)
  print_fps: true
