# Portal Turret yapılandırması — tüm ayarlar tek yerde.
# Açılar derece (0-180). Kalibrasyon değerleri calibrate.py tarafından doldurulur.

serial:
  port: /dev/cu.usbmodem3CDC754A49F02   # Mac. (Pi'de /dev/ttyACM0 olur)
  baud: 115200
  command_hz: 30          # saniyede gönderilen komut sayısı
  reconnect_delay_s: 2.0

camera:
  width: 640
  height: 480
  fps: 30
  hflip: true             # ayna düzeltmesi: sen sağa gidince göz de sağa baksın
  vflip: false

detection:
  backend: yolo           # yolo | mediapipe
  model: yolo11n.pt       # ultralytics; ilk çalıştırmada NCNN'e export edilir
  use_ncnn: true          # Pi 5'te ~2x hız
  conf: 0.45              # minimum güven
  person_class_id: 0      # COCO 'person'
  # En büyük (en yakın) insan hedef seçilir.

servos:
  # Mekanik limitler — montajda kendi turretine göre daralt.
  pan:  { min: 10, max: 170, center: 90, invert: false }
  tilt: { min: 40, max: 140, center: 90, invert: false }
  eye_x: { min: 55, max: 135, center: 95, invert: false }   # sol 55 - sağ 135
  eye_y: { min: 0, max: 70, center: 35, invert: false }     # yukarı 0 - aşağı 70
  eye_follow_gain: 0.35   # (sadece eye_direct:false iken) göz pan/tilt'i taklit oranı
  eye_direct: true        # true: göz DOĞRUDAN hedef pikseline bakar (eye-only demo)
  laser_always_on: true

smoothing:
  max_step_deg: 12.0      # kare başına max açı değişimi (büyük = daha hızlı/snappy)
  lowpass_alpha: 0.55     # 0..1, büyük = daha hızlı tepki (küçük = yumuşak/yavaş)
  deadzone_px: 25         # hedef kare merkezine bu kadar yakınsa kıpırdama (titreme önler)

# Kamera pikselinden servo açısına doğrusal eşleme.
# calibrate.py bunu yazar. Varsayılan: kabaca lineer, FOV ~ tüm aralık.
calibration:
  pan:  { px_min: 0,   px_max: 640, deg_at_px_min: 170, deg_at_px_max: 10 }
  tilt: { px_min: 0,   px_max: 480, deg_at_px_min: 40,  deg_at_px_max: 140 }

# Eski Turret.ini zamanlayıcı mantığı (ms).
timers:
  found_ms: 1000          # hedef onayı (TARGET_ACQUIRED -> TRACKING)
  lost_ms: 1000           # hedef kaybı onayı
  reacquire_ms: 500       # kayıptan sonra yeniden kilit penceresi
  fire_cooldown_ms: 4000  # "Fire/Gotcha" sesi tekrar aralığı
  lock_tolerance_px: 40   # hedef merkeze bu kadar yakınsa "kilit"

sounds:
  enabled: true
  base_dir: sounds
  found:  [TargetFound/ISeeYou.wav, TargetFound/ThereYouAre.wav, TargetFound/Acquired.wav]
  lock:   [TargetFound/Gotcha.wav, Fire.wav, Fire/FireShort.wav]
  lost:   [TargetLost/AreYouStillThere.wav, TargetLost/TargetLost.wav]

debug:
  show_window: true       # Mac demosunda tespit penceresini gör (Pi headless'te false yap)
  print_fps: true
